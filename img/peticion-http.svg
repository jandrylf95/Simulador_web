<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="Segoe UI, sans-serif">
  <defs>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#185FA5"/>
    </marker>
  </defs>
  <rect width="700" height="300" fill="#ffffff"/>

  <text x="350" y="30" text-anchor="middle" font-size="15" fill="#0C447C" font-weight="700">Estructura de una petición HTTP</text>

  <!-- Cliente -->
  <g transform="translate(40,90)">
    <rect width="120" height="90" rx="12" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1.5"/>
    <rect x="0" y="0" width="120" height="20" rx="12" fill="#185FA5"/>
    <rect x="0" y="10" width="120" height="10" fill="#185FA5"/>
    <text x="60" y="50" text-anchor="middle" font-size="12" fill="#0C447C" font-weight="600">Navegador</text>
    <text x="60" y="68" text-anchor="middle" font-size="10" fill="#4A5568">(Cliente)</text>
  </g>

  <!-- Mensaje petición -->
  <g transform="translate(220,70)">
    <rect width="260" height="160" rx="10" fill="#0f1b2d" stroke="#1d3a5f"/>
    <text x="16" y="28" font-size="11" fill="#7fd1ff" font-family="monospace">GET /index.html HTTP/1.1</text>
    <text x="16" y="50" font-size="11" fill="#f6c177" font-family="monospace">Host: www.utpl.edu.ec</text>
    <text x="16" y="72" font-size="11" fill="#f6c177" font-family="monospace">User-Agent: Mozilla/5.0</text>
    <text x="16" y="94" font-size="11" fill="#f6c177" font-family="monospace">Accept: text/html</text>
    <text x="16" y="116" font-size="11" fill="#f6c177" font-family="monospace">Accept-Language: es-EC</text>
    <text x="16" y="138" font-size="10" fill="#6b7d94" font-family="monospace">// línea de petición + cabeceras</text>
  </g>

  <!-- Servidor -->
  <g transform="translate(540,90)">
    <rect width="120" height="90" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
    <rect x="20" y="16" width="80" height="14" rx="3" fill="#0F6E56"/>
    <rect x="20" y="36" width="80" height="14" rx="3" fill="#0F6E56" opacity="0.6"/>
    <text x="60" y="72" text-anchor="middle" font-size="12" fill="#085041" font-weight="600">Servidor</text>
  </g>

  <line x1="162" y1="150" x2="216" y2="150" stroke="#185FA5" stroke-width="2" marker-end="url(#ar2)"/>
  <line x1="482" y1="150" x2="536" y2="150" stroke="#185FA5" stroke-width="2" marker-end="url(#ar2)"/>

  <text x="350" y="270" text-anchor="middle" font-size="11" fill="#4A5568">La petición incluye el <tspan font-weight="700" fill="#185FA5">método</tspan>, la <tspan font-weight="700" fill="#185FA5">ruta</tspan>, la <tspan font-weight="700" fill="#185FA5">versión</tspan> y las <tspan font-weight="700" fill="#185FA5">cabeceras</tspan></text>
</svg>

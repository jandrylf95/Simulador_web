<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="Segoe UI, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#185FA5"/>
    </marker>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E6F1FB"/>
      <stop offset="1" stop-color="#cfe3f8"/>
    </linearGradient>
  </defs>

  <rect width="760" height="320" fill="#ffffff"/>

  <!-- Usuario -->
  <g transform="translate(40,120)">
    <rect width="120" height="80" rx="12" fill="url(#g1)" stroke="#85B7EB"/>
    <circle cx="60" cy="30" r="14" fill="#185FA5"/>
    <rect x="44" y="48" width="32" height="18" rx="8" fill="#185FA5"/>
    <text x="60" y="76" text-anchor="middle" font-size="12" fill="#0C447C" font-weight="600">Usuario</text>
  </g>

  <!-- Navegador -->
  <g transform="translate(225,110)">
    <rect width="130" height="100" rx="12" fill="#ffffff" stroke="#85B7EB" stroke-width="1.5"/>
    <rect x="0" y="0" width="130" height="24" rx="12" fill="#185FA5"/>
    <rect x="0" y="12" width="130" height="12" fill="#185FA5"/>
    <circle cx="14" cy="12" r="3.5" fill="#fff" opacity="0.8"/>
    <circle cx="26" cy="12" r="3.5" fill="#fff" opacity="0.8"/>
    <rect x="14" y="38" width="102" height="16" rx="8" fill="#E6F1FB" stroke="#85B7EB"/>
    <text x="20" y="50" font-size="9" fill="#185FA5">https://...</text>
    <text x="65" y="78" text-anchor="middle" font-size="12" fill="#0C447C" font-weight="600">Navegador</text>
    <text x="65" y="92" text-anchor="middle" font-size="9" fill="#4A5568">(Cliente)</text>
  </g>

  <!-- Servidor -->
  <g transform="translate(600,110)">
    <rect width="120" height="100" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
    <rect x="20" y="18" width="80" height="16" rx="3" fill="#0F6E56"/>
    <rect x="20" y="40" width="80" height="16" rx="3" fill="#0F6E56" opacity="0.7"/>
    <rect x="20" y="62" width="80" height="16" rx="3" fill="#0F6E56" opacity="0.5"/>
    <circle cx="30" cy="26" r="3" fill="#9FE1CB"/>
    <circle cx="30" cy="48" r="3" fill="#9FE1CB"/>
    <text x="60" y="94" text-anchor="middle" font-size="12" fill="#085041" font-weight="600">Servidor Web</text>
  </g>

  <!-- Flecha usuario -> navegador -->
  <line x1="162" y1="160" x2="222" y2="160" stroke="#185FA5" stroke-width="2" marker-end="url(#ar)"/>
  <text x="192" y="150" text-anchor="middle" font-size="9" fill="#4A5568">escribe URL</text>

  <!-- Flecha navegador -> servidor (petición) -->
  <path d="M358 140 L596 140" stroke="#185FA5" stroke-width="2" marker-end="url(#ar)" fill="none"/>
  <rect x="410" y="118" width="130" height="18" rx="9" fill="#185FA5"/>
  <text x="475" y="131" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Petición HTTP (GET)</text>

  <!-- Flecha servidor -> navegador (respuesta) -->
  <path d="M596 185 L358 185" stroke="#0F6E56" stroke-width="2" marker-end="url(#ar)" fill="none"/>
  <rect x="400" y="190" width="150" height="18" rx="9" fill="#0F6E56"/>
  <text x="475" y="203" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Respuesta HTTP (HTML)</text>

  <!-- Título -->
  <text x="380" y="34" text-anchor="middle" font-size="15" fill="#0C447C" font-weight="700">Del URL a la página: el viaje de una petición web</text>
  <text x="380" y="54" text-anchor="middle" font-size="11" fill="#4A5568">El navegador traduce la URL en una petición; el servidor responde con el documento HTML</text>

  <!-- Paso final: render -->
  <g transform="translate(225,250)">
    <rect width="130" height="46" rx="10" fill="#FAEEDA" stroke="#FAC775"/>
    <text x="65" y="20" text-anchor="middle" font-size="10" fill="#854F0B" font-weight="700">5 · El navegador</text>
    <text x="65" y="34" text-anchor="middle" font-size="10" fill="#854F0B">interpreta y muestra</text>
  </g>
  <path d="M290 210 L290 248" stroke="#FAC775" stroke-width="2" marker-end="url(#ar)" fill="none"/>
</svg>

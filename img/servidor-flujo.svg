<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="Segoe UI, sans-serif">
  <defs>
    <marker id="ar3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#0F6E56"/>
    </marker>
    <marker id="ar3b" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#185FA5"/>
    </marker>
  </defs>
  <rect width="720" height="340" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="15" fill="#0C447C" font-weight="700">¿Qué hace el servidor con la petición?</text>

  <!-- Cliente -->
  <g transform="translate(30,140)">
    <rect width="110" height="80" rx="12" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1.5"/>
    <rect x="0" y="0" width="110" height="18" rx="12" fill="#185FA5"/>
    <rect x="0" y="9" width="110" height="9" fill="#185FA5"/>
    <text x="55" y="48" text-anchor="middle" font-size="11" fill="#0C447C" font-weight="600">Cliente</text>
    <text x="55" y="64" text-anchor="middle" font-size="9" fill="#4A5568">Navegador</text>
  </g>

  <!-- Servidor (caja grande) -->
  <g transform="translate(210,75)">
    <rect width="300" height="210" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
    <text x="150" y="28" text-anchor="middle" font-size="12" fill="#085041" font-weight="700">Servidor Web (Apache / XAMPP)</text>

    <rect x="30" y="44" width="240" height="32" rx="8" fill="#fff" stroke="#9FE1CB"/>
    <text x="150" y="64" text-anchor="middle" font-size="10" fill="#0F6E56" font-weight="600">1. Recibe la petición HTTP</text>

    <rect x="30" y="84" width="240" height="32" rx="8" fill="#fff" stroke="#9FE1CB"/>
    <text x="150" y="104" text-anchor="middle" font-size="10" fill="#0F6E56" font-weight="600">2. Procesa la lógica (PHP/BD)</text>

    <rect x="30" y="124" width="240" height="32" rx="8" fill="#fff" stroke="#9FE1CB"/>
    <text x="150" y="144" text-anchor="middle" font-size="10" fill="#0F6E56" font-weight="600">3. Localiza o genera el recurso</text>

    <rect x="30" y="164" width="240" height="32" rx="8" fill="#fff" stroke="#9FE1CB"/>
    <text x="150" y="184" text-anchor="middle" font-size="10" fill="#0F6E56" font-weight="600">4. Construye la respuesta HTTP</text>
  </g>

  <!-- Base de datos -->
  <g transform="translate(580,150)">
    <ellipse cx="55" cy="14" rx="40" ry="12" fill="#854F0B"/>
    <path d="M15 14 V56 a40 12 0 0 0 80 0 V14" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
    <ellipse cx="55" cy="14" rx="40" ry="12" fill="#FAC775" stroke="#854F0B"/>
    <text x="55" y="80" text-anchor="middle" font-size="10" fill="#633806" font-weight="600">Base de datos</text>
  </g>

  <!-- Flechas -->
  <path d="M140 165 L206 165" stroke="#185FA5" stroke-width="2" marker-end="url(#ar3b)" fill="none"/>
  <text x="173" y="156" text-anchor="middle" font-size="8" fill="#185FA5">petición</text>

  <path d="M512 175 L576 175" stroke="#0F6E56" stroke-width="2" marker-end="url(#ar3)" fill="none"/>
  <path d="M576 195 L512 195" stroke="#854F0B" stroke-width="2" fill="none" marker-end="url(#ar3)"/>
  <text x="544" y="215" text-anchor="middle" font-size="8" fill="#854F0B">datos</text>

  <text x="360" y="315" text-anchor="middle" font-size="11" fill="#4A5568">El servidor interpreta la solicitud, consulta datos si es necesario y devuelve una respuesta HTTP</text>
</svg>
